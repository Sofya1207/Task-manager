<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>TaskFlow Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>TaskFlow Manager</h1>

  <div class="form">
    <input type="text" id="taskName" placeholder="Enter task...">

    <select id="priority">
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <label>
      <input type="checkbox" id="important"> Important
    </label>

    <label>
      <input type="checkbox" id="completed"> Completed
    </label>

    <button onclick="addTask()">Add Task</button>
  </div>

  <div id="taskmanager"></div>

  <script src="script.js"></script>
</body>

</html>
